name = "accnotify"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "accnotify-db"
database_id = "b1111118-9314-4100-a210-dbduia739133"

[durable_objects]
bindings = [
  { name = "DEVICE_HUB", class_name = "DeviceHub" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DeviceHub"]

[vars]
ENABLE_E2E = "false"
